services:
  ollama:
    image: ollama/ollama:latest
    command: ["serve"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        if ollama list | grep -q '^mistral:'; then
          echo 'mistral already present; skipping pull'
        else
          echo 'mistral missing; pulling model'
          ollama pull mistral
        fi
    restart: "no"

  simulation:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    restart: "no"

volumes:
  ollama-data:
