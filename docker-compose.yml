services:
  ollama:
    image: ollama/ollama:latest
    command: ["serve"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        if ollama list | grep -q '^mistral:'; then
          echo 'mistral already present; skipping pull'
        else
          echo 'mistral missing; pulling model'
          ollama pull mistral
        fi
    restart: "no"

  ollama-interpreter-init:
    image: ollama/ollama:latest
    profiles: ["llm"]
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ./Modelfile.interpreter:/tmp/Modelfile.interpreter:ro
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        if ollama list | grep -q '^sim-interpreter:'; then
          echo 'sim-interpreter already present; skipping create'
        else
          echo 'sim-interpreter missing; creating from Modelfile.interpreter'
          ollama create sim-interpreter -f /tmp/Modelfile.interpreter
        fi
    restart: "no"

  simulation:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SIM_FORCE_HEURISTIC: "1"
    restart: "no"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "dashboard_cli.py"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: mistral
      OLLAMA_INTERPRETER_MODEL: sim-interpreter
      SIM_FORCE_HEURISTIC: "1"
      SIM_ENABLE_INTERPRETER: "0"
      SIM_INFERENCE_TIMEOUT_SECONDS: "12"
      SIM_INFERENCE_COOLDOWN_TICKS: "2"
      SIM_INTERPRETER_TIMEOUT_SECONDS: "8"
      SIM_INTERPRETER_COOLDOWN_TICKS: "8"
      SIM_INTERPRETER_INTERVAL_TICKS: "5"
    stdin_open: true
    tty: true
    restart: "no"

  simulation-llm:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["llm"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: mistral
      OLLAMA_INTERPRETER_MODEL: sim-interpreter
      SIM_FORCE_HEURISTIC: "0"
      SIM_ENABLE_INTERPRETER: "1"
      SIM_INFERENCE_TIMEOUT_SECONDS: "12"
      SIM_INFERENCE_COOLDOWN_TICKS: "2"
      SIM_INTERPRETER_TIMEOUT_SECONDS: "8"
      SIM_INTERPRETER_COOLDOWN_TICKS: "8"
      SIM_INTERPRETER_INTERVAL_TICKS: "5"
    depends_on:
      ollama-interpreter-init:
        condition: service_completed_successfully
    restart: "no"

volumes:
  ollama-data:
